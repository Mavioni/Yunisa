<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; connect-src http://127.0.0.1:* https://huggingface.co https://*.huggingface.co https://cdn.jsdelivr.net; frame-src 'self' http://127.0.0.1:*; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com;">
  <title>YUNISA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <!-- Loading -->
    <div id="loading-screen" class="screen active">
      <div class="loading-container">
        <img src="styles/logo.png" alt="YUNISA" class="logo-img">
        <h1 class="logo">YUNISA</h1>
        <div class="spinner"></div>
        <p id="loading-status">Starting...</p>
      </div>
    </div>

    <!-- Welcome Wizard -->
    <div id="welcome-screen" class="screen"></div>

    <!-- Global Sidebar Layout -->
    <div class="icon-rail">
      <img src="styles/logo.png" alt="Y" class="rail-logo">
      <button id="nav-chat" class="rail-btn active" title="Chat">💬</button>
      <button id="nav-interpreter" class="rail-btn" title="Interpreter">⌨️</button>
      <button id="nav-nemoclaw" class="rail-btn green" title="NemoClaw">🤖</button>
      <button id="nav-models" class="rail-btn" title="Models">📦</button>
      <button id="nav-vlm" class="rail-btn yellow" style="display: none;" title="VLM Studio">⚡</button>
      <div class="rail-spacer"></div>
      <button id="nav-settings" class="rail-btn" title="Settings">⚙️</button>
    </div>

    <div id="conv-panel" class="conv-panel">
      <div class="conv-panel-header">
        <button id="new-chat-btn" class="btn btn-primary">+ New Chat</button>
      </div>
      <div id="conversation-list" class="conversation-list"></div>
    </div>

    <!-- Main Screens Container -->
    <div id="main-content" style="flex: 1; position: relative; overflow: hidden; display: flex;">
      <!-- Chat Screen -->
      <div id="chat-screen" class="screen full-width-screen active">
        <div class="chat-main">
          <div id="chat-header" class="chat-header">
            <span id="chat-title">New Chat</span>
            <span id="model-badge" class="badge"></span>
          </div>
          <div id="messages" class="messages"></div>
          <div id="context-warning" class="context-warning hidden">
            Older messages truncated to fit context window
          </div>
          <div class="input-area">
            <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
            <button id="send-btn" class="btn btn-primary" disabled>Send</button>
            <button id="stop-btn" class="btn btn-danger hidden">Stop</button>
          </div>
        </div>
      </div>

      <!-- Other Screens -->
      <div id="nemoclaw-screen" class="screen full-width-screen"></div>
      <div id="vlm-screen" class="screen full-width-screen"></div>
      <div id="interpreter-screen" class="screen full-width-screen"></div>
      <div id="models-screen" class="screen full-width-screen"></div>
      <div id="settings-screen" class="screen full-width-screen"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
