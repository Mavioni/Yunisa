<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; connect-src http://127.0.0.1:* https://huggingface.co https://*.huggingface.co https://cdn.jsdelivr.net; frame-src 'self' http://127.0.0.1:*; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com;">
  <title>YUNISA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <canvas id="aurora-bg"></canvas>
  <div id="app">
    <!-- Loading -->
    <div id="loading-screen" class="screen active">
      <div class="loading-container">
        <img src="styles/logo.png" alt="YUNISA" class="logo-img">
        <h1 class="logo">YUNISA</h1>
        <div class="spinner"></div>
        <p id="loading-status">Starting...</p>
      </div>
    </div>

    <!-- Welcome Wizard -->
    <div id="welcome-screen" class="screen"></div>

    <!-- Global Sidebar Layout -->
    <div class="icon-rail">
      <img src="styles/logo.png" alt="Y" class="rail-logo">
      <button id="nav-chat" class="rail-btn active" title="Chat"><img src="assets/icons/chat.png" class="custom-icon" alt="Chat"></button>
      <button id="nav-models" class="rail-btn" title="Models"><img src="assets/icons/models.png" class="custom-icon" alt="Models"></button>
      <button id="nav-vlm" class="rail-btn yellow hidden" title="VLM Studio"><img src="assets/icons/vlm.png" class="custom-icon" alt="VLM"></button>
      <button id="nav-nemoclaw" class="rail-btn" title="NemoClaw Sandbox"><img src="assets/icons/sandbox.png" class="custom-icon" alt="Sandbox"></button>
      <button id="nav-nexus" class="rail-btn" title="Data Nexus">
        <svg class="custom-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
      </button>
      <div class="rail-spacer"></div>
      <button id="nav-settings" class="rail-btn" title="Settings"><img src="assets/icons/settings.png" class="custom-icon" alt="Settings"></button>
    </div>

    <div id="conv-panel" class="conv-panel">
      <div class="conv-panel-header">
        <button id="new-chat-btn" class="btn btn-primary">+ New Chat</button>
      </div>
      <div id="conversation-list" class="conversation-list"></div>
    </div>

    <!-- Main Screens Container -->
    <div id="main-content">
      <!-- Chat Screen -->
      <div id="chat-screen" class="screen full-width-screen active">
        <div class="chat-main">
          <div id="chat-header" class="chat-header">
            <span id="chat-title">New Chat</span>
            <span id="model-badge" class="badge"></span>
          </div>
          <div id="messages" class="messages"></div>
          <div id="context-warning" class="context-warning hidden">
            Older messages truncated to fit context window
          </div>
          <div class="input-area-wrapper">
            <div class="input-controls">
              <label class="toggle-pill" id="btn-agent-mode" title="Engage Autonomous Agent-S Operations">
                <input type="checkbox" id="agent-mode-toggle" aria-label="Agent Mode Toggle">
                <span>🤖 Agent Mode</span>
              </label>
              <label class="toggle-pill" id="btn-research-mode" title="Enable Deep Research">
                <input type="checkbox" id="research-mode-toggle" aria-label="Research Mode Toggle">
                <span>🔍 Deep Research</span>
              </label>
            </div>
            <div class="input-area">
              <textarea id="user-input" placeholder="Message YUNISA..." rows="1"></textarea>
              <button id="send-btn" class="btn btn-primary btn-icon" disabled aria-label="Send Message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
              </button>
              <button id="stop-btn" class="btn btn-danger btn-icon hidden" aria-label="Stop Generation">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>
              </button>
            </div>
          </div>
        </div>
        
        <!-- Right Panel (Context & Tools) -->
        <div id="right-panel" class="right-panel hidden">
          <div class="right-panel-header">Context & Details</div>
          <div id="right-panel-content" class="right-panel-content">
            <!-- Dynamic content injected here -->
          </div>
        </div>
      </div>

      <!-- Other Screens -->
      <div id="vlm-screen" class="screen full-width-screen"></div>
      <div id="nemoclaw-screen" class="screen full-width-screen"></div>
      <div id="models-screen" class="screen full-width-screen"></div>
      <div id="settings-screen" class="screen full-width-screen"></div>
      <div id="nexus-screen" class="screen full-width-screen"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="aurora.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
